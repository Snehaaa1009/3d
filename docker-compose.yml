services:
  backend:
    build:
      context: ./backend
    container_name: ipp-backend
    environment:
      - APP_AUTH_SECRET=dev-compose-secret
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app/uploads:/app/app/uploads
      - ./backend/app/static:/app/app/static

  frontend:
    build:
      context: ./frontend
    container_name: ipp-frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
